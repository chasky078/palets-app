<html lang="es">
<head>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-title" content="Colores Palets">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>COLORES PALETS </title>

  <style>
:root {
  --bg:#050914;
  --panel:#111827;
  --panel2:#172033;
  --line:rgba(255,255,255,.16);
  --text:#ffffff;
  --muted:#aab7cf;
  --orange:#ff7a18;
  --yellow:#facc15;
  --red:#ef4444;
  --green:#22c55e;
}
* { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin:0; min-height:100%; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
body {
  padding: max(10px, env(safe-area-inset-top)) 10px max(12px, env(safe-area-inset-bottom));
  background:
    radial-gradient(circle at 18% 0%, rgba(250,204,21,.18), transparent 30%),
    radial-gradient(circle at 100% 0%, rgba(37,99,235,.16), transparent 30%),
    linear-gradient(180deg,#050914,#08111f 52%,#050914);
}
.app { max-width:760px; margin:0 auto; }
.header {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:8px 4px 12px;
}
.logo {
  display:flex; align-items:center; gap:10px;
  font-weight:1000; letter-spacing:-1px; font-size:clamp(28px,8vw,44px);
}
.logo-mark {
  width:48px; height:48px; border-radius:14px;
  background: #0b4ea2;
  display:grid; place-items:center; color:#111827; font-size:26px; font-weight:1000;
  box-shadow:0 10px 28px rgba(249,115,22,.24);
}
.badge {
  border:1px solid var(--line); background:rgba(255,255,255,.07);
  color:#dbeafe; border-radius:999px; padding:8px 11px;
  font-size:12px; font-weight:900; white-space:nowrap;
}
.search-card {
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
  border:1px solid var(--line); border-radius:26px;
  padding:16px; box-shadow:0 24px 60px rgba(0,0,0,.35);
}
.row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
label {
  display:block; color:#dbeafe; font-weight:1000; letter-spacing:.06em;
  font-size:14px; margin:0 0 7px 3px;
}
input {
  width:100%; border:1px solid rgba(255,255,255,.18);
  background:#071022; color:#fff; border-radius:20px;
  font-size:40px; padding:18px 16px; outline:none; font-weight:800;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
}
input:focus { border-color:#f59e0b; box-shadow:0 0 0 4px rgba(245,158,11,.18); }
.btn {
  width:100%; border:0; border-radius:22px; padding:20px 14px; margin-top:12px;
  font-size:30px; font-weight:1000; color:#111827;
  background:linear-gradient(135deg,#facc15,#ff7a18);
  box-shadow:0 12px 30px rgba(249,115,22,.24);
}
.btn-clear {
  background:rgba(255,255,255,.10); color:#fff; border:1px solid var(--line);
  box-shadow:none; font-size:24px; padding:16px;
}
.result {
  margin-top:14px; border-radius:26px; border:1px solid var(--line);
  background:#071022; overflow:hidden;
}
.status {
  padding:14px 16px; display:flex; align-items:center; gap:10px;
  border-bottom:1px solid rgba(255,255,255,.10);
}
.status-icon {
  width:42px; height:42px; border-radius:50%; display:grid; place-items:center;
  font-size:24px; font-weight:1000;
}
.ok { background:rgba(34,197,94,.18); color:#4ade80; border:1px solid rgba(34,197,94,.38); }
.no { background:rgba(239,68,68,.16); color:#f87171; border:1px solid rgba(239,68,68,.34); }
.status-text { font-size:18px; color:#dbeafe; font-weight:900; }
.status-text b { color:#fff; }
.option {
  margin:14px; padding:14px; border-radius:24px;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.035));
}
.option-head {
  display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px;
}
.option-title {
  font-size:32px; font-weight:1000; letter-spacing:-.5px;
}
.doulite {
  display:flex; align-items:center; gap:8px;
  border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.10);
  border-radius:999px; padding:8px 12px; font-size:15px; font-weight:1000;
}
.dot { width:28px; height:28px; border-radius:50%; border:2px solid rgba(255,255,255,.55); flex:0 0 auto; }
.section-title {
  color:#c7d2fe; text-transform:uppercase; letter-spacing:.12em;
  font-size:12px; font-weight:1000; margin:0 0 8px 2px;
}
.palette-grid {
  display:grid;
  grid-template-columns:repeat(3, minmax(0,1fr));
  gap:10px;
}
.color-block {
  min-height:108px; border-radius:20px; padding:12px;
  display:flex; flex-direction:column; justify-content:space-between;
  border:1px solid rgba(255,255,255,.18);
  box-shadow: inset 0 0 24px rgba(255,255,255,.10), 0 10px 24px rgba(0,0,0,.24);
  text-shadow:0 3px 9px rgba(0,0,0,.7);
}
.color-code { font-size:36px; font-weight:1000; line-height:1; }
.color-name { font-size:13px; font-weight:1000; }
.empty {
  padding:28px 16px; color:#cbd5e1; font-size:20px; line-height:1.35;
}
.quick {
  display:flex; gap:8px; overflow-x:auto; padding:10px 2px 2px; scrollbar-width:none;
}
.quick button {
  border:1px solid var(--line); background:rgba(255,255,255,.08); color:#fff;
  border-radius:999px; padding:10px 13px; font-weight:900; white-space:nowrap;
}
@media(max-width:430px) {
  body { padding-left:8px; padding-right:8px; }
  .logo { font-size:30px; }
  .logo-mark { width:42px; height:42px; }
  .search-card { padding:12px; border-radius:22px; }
  input { font-size:34px; padding:16px 14px; }
  .btn { font-size:26px; padding:18px 12px; }
  .option { margin:10px; padding:12px; }
  .option-title { font-size:28px; }
  .palette-grid { gap:8px; }
  .color-block { min-height:98px; border-radius:17px; padding:10px; }
  .color-code { font-size:31px; }
  .color-name { font-size:12px; }
  .doulite { font-size:13px; padding:7px 10px; }
  .dot { width:24px; height:24px; }
}
</style>
</head>

", "COLOR_DOULITE": "NAR", "OPCION": "1"}, {"ANCHO": "1002", "LARGO": "890", "COLOR_PALET": "NE-X-AZ", "COLOR_DOULITE": "BLA", "OPCION": "1"}, {"ANCHO": "1002", "LARGO": "960", "COLOR_PALET": "BL-RO-BL", "COLOR_DOULITE": "NO LLEVA", "OPCION": "1"}, {"ANCHO": "1002", "LARGO": "967", "COLOR_PALET": "BL-RO-BL", "COLOR_DOULITE": "NO LLEVA", "OPCION": "1"}, {"ANCHO": "1004", "LARGO": "757", "COLOR_PALET": "AZ-X-NA", "COLOR_DOULITE": "AZU", "OPCION": "1"}, {"ANCHO": "1004", "LARGO": "890", "COLOR_PALET": "X-BL-X", "COLOR_DOULITE": "BLA", "OPCION": "1"}, {"ANCHO": "1004", "LARGO": "936", "COLOR_PALET": "BL-RO-BL", "COLOR_DOULITE": "NEG", "OPCION": "1"}, {"ANCHO": "1019", "LARGO": "954", "COLOR_PALET": "BL-RO-BL", "COLOR_DOULITE": "NO LLEVA", "OPCION": "1"}, {"ANCHO": "1019", "LARGO": "967", "COLOR_PALET": "AZ-AZ-NE", "COLOR_DOULITE": "NO LLEVA", "OPCION": "1"}, {"ANCHO": "1035", "LARGO": "954", "COLOR_PALET": "NE-NE-AZ", "COLOR_DOULITE": "NO LLEVA", "OPCION": "1"}, {"ANCHO": "1035", "LARGO": "957", "COLOR_PALET": "NE-NE-AZ", "COLOR_DOULITE": "NO LLEVA", "OPCION": "1"}, {"ANCHO": "1042", "LARGO": "868", "COLOR_PALET": "GR-GR-GR", "COLOR_DOULITE": "NO LLEVA", "OPCION": "1"}, {"ANCHO": "1042", "LARGO": "954", "COLOR_PALET": "NE-NE-AZ", "COLOR_DOULITE": "NO LLEVA", "OPCION": "1"}];

const ALIAS = { BI:"BL", BLA:"BL", AZU:"AZ", NEG:"NE", NG:"NE", VER:"VE", ROJ:"RO", AMA:"AM", GRI:"GR", NAR:"NA" };
const INFO = {
  AZ:{n:"Azul",h:"#2563eb"},
  NE:{n:"Negro",h:"#111827"},
  VE:{n:"Verde",h:"#16a34a"},
  NA:{n:"Naranja",h:"#f97316"},
  RO:{n:"Rojo",h:"#dc2626"},
  BL:{n:"Blanco",h:"#e5e7eb",t:"#111827"},
  AM:{n:"Amarillo",h:"#facc15",t:"#111827"},
  GR:{n:"Gris",h:"#64748b"},
  X:{n:"Madera",h:"#a16207"},
  "NO LLEVA":{n:"Sin Doulite",h:"#374151"}
};

function num(v) {
  return String(v ?? "").trim().replace(/^0+/, "") || "0";
}
function txt(v) {
  return String(v ?? "").trim().toUpperCase();
}
function canon(c) {
  c = txt(c);
  return ALIAS[c] || c;
}
function parts(v) {
  const s = txt(v);
  if (!s) return [];
  if (s === "NO LLEVA") return ["NO LLEVA"];
  return s
    .replace(/\s*\/\/\s*/g, "-")
    .replace(/\s*\/\s*/g, "-")
    .replace(/\s*-\s*/g, "-")
    .split("-")
    .map(x => canon(x))
    .filter(Boolean);
}
function info(c) {
  c = canon(c);
  return INFO[c] || {n:c, h:"#333"};
}
function colorBlock(c) {
  c = canon(c);
  const i = info(c);
  return `<div class="color-block" style="background:${i.h};color:${i.t || "#fff"}">
    <div class="color-code">${c}</div>
    <div class="color-name">${i.n}</div>
  </div>`;
}
function douliteBadge(v) {
  const c = (parts(v || "NO LLEVA")[0] || "NO LLEVA");
  const i = info(c);
  return `<div class="doulite"><span class="dot" style="background:${i.h}"></span><span>${c} · ${i.n}</span></div>`;
}
function buscar() {
  const a = num(document.getElementById("ancho").value);
  const l = num(document.getElementById("largo").value);
  const hits = DATA.filter(r => num(r.ANCHO) === a && num(r.LARGO) === l);
  const result = document.getElementById("result");

  if (!hits.length) {
    result.innerHTML = `
      <div class="status">
        <div class="status-icon no">×</div>
        <div class="status-text">No hay resultado para <b>${a} x ${l}</b>.</div>
      </div>`;
    return;
  }

  saveQuick(a, l);

  result.innerHTML = `
    <div class="status">
      <div class="status-icon ok">✓</div>
      <div class="status-text">${hits.length} opción(es) para <b>${a} x ${l}</b></div>
    </div>
    ${hits.map((h, idx) => `
      <div class="option">
        <div class="option-head">
          <div class="option-title">OPCIÓN ${h.OPCION || idx + 1}</div>
          ${douliteBadge(h.COLOR_DOULITE)}
        </div>
        <div class="section-title">Color palet</div>
        <div class="palette-grid">${parts(h.COLOR_PALET).map(colorBlock).join("")}</div>
      </div>
    `).join("")}`;
}
function limpiar() {
  document.getElementById("ancho").value = "";
  document.getElementById("largo").value = "";
  document.getElementById("ancho").focus();
  document.getElementById("result").innerHTML = `
    <div class="status">
      <div class="status-icon ok">✓</div>
      <div class="status-text">Listo. Mete una medida.</div>
    </div>`;
}
function saveQuick(a,l) {
  let arr = [];
  try { arr = JSON.parse(localStorage.getItem("quickPalets") || "[]"); } catch(e) {}
  const key = `${a}x${l}`;
  arr = arr.filter(x => x.key !== key);
  arr.unshift({key,a,l});
  arr = arr.slice(0,6);
  localStorage.setItem("quickPalets", JSON.stringify(arr));
  renderQuick();
}
function renderQuick() {
  let arr = [];
  try { arr = JSON.parse(localStorage.getItem("quickPalets") || "[]"); } catch(e) {}
  document.getElementById("quick").innerHTML = arr.map(x => 
    `<button onclick="ancho.value='${x.a}'; largo.value='${x.l}'; buscar();">${x.a} × ${x.l}</button>`
  ).join("");
}
document.getElementById("ancho").addEventListener("keydown", e => { if(e.key === "Enter") document.getElementById("largo").focus(); });
document.getElementById("largo").addEventListener("keydown", e => { if(e.key === "Enter") buscar(); });
renderQuick();
</script>
