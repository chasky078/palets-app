<title>COLORES PALETS </title>

  <style>
:root {
  --bg:#050914;
  --panel:#111827;
  --panel2:#172033;
  --line:rgba(255,255,255,.16);
  --text:#ffffff;
  --muted:#aab7cf;
  --orange:#ff7a18;
  --yellow:#facc15;
  --red:#ef4444;
  --green:#22c55e;
}
* { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin:0; min-height:100%; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
body {
  padding: max(10px, env(safe-area-inset-top)) 10px max(12px, env(safe-area-inset-bottom));
  background:
    radial-gradient(circle at 18% 0%, rgba(250,204,21,.18), transparent 30%),
    radial-gradient(circle at 100% 0%, rgba(37,99,235,.16), transparent 30%),
    linear-gradient(180deg,#050914,#08111f 52%,#050914);
}
.app { max-width:760px; margin:0 auto; }
